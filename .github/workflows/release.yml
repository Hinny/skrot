name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.SKROT_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/skrot.jks"

      - name: Run unit tests
        run: ./gradlew test

      - name: Build signed release APK
        env:
          SKROT_KEYSTORE_FILE: ${{ runner.temp }}/skrot.jks
          SKROT_KEYSTORE_PASSWORD: ${{ secrets.SKROT_KEYSTORE_PASSWORD }}
          SKROT_KEY_ALIAS: ${{ secrets.SKROT_KEY_ALIAS }}
          SKROT_KEY_PASSWORD: ${{ secrets.SKROT_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "skrot-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: skrot-*.apk
          generate_release_notes: true
